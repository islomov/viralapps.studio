<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Apps Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .tagline {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 3rem;
        }
        .apps {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .app-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 1.5rem;
            text-decoration: none;
            color: #fff;
            transition: border-color 0.2s;
        }
        .app-card:hover {
            border-color: #444;
        }
        .app-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .app-desc {
            font-size: 0.9rem;
            color: #888;
        }
        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Viral Apps Studio</h1>
        <p class="tagline">Simple apps, done right.</p>
        <div class="apps">
            <a href="/zebracodescanner/" class="app-card">
                <div class="app-name">Zebra Code Scanner</div>
                <div class="app-desc">Generate and scan QR codes & barcodes</div>
            </a>
        </div>
        <footer>&copy; 2025 Viral Apps Studio</footer>
    </div>
</body>
</html>
